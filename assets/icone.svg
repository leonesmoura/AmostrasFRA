<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12557f"/>
      <stop offset="1" stop-color="#07263b"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f8fd"/>
      <stop offset="1" stop-color="#cfe3f4"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="244" height="244" rx="56" fill="url(#bg)"/>

  <!-- arco de Nyquist sutil ao fundo -->
  <path d="M40 176 A66 66 0 0 1 172 176" fill="none"
        stroke="#3f8fc0" stroke-width="4" stroke-dasharray="2 10"
        stroke-linecap="round" opacity="0.45"/>

  <!-- orelhas -->
  <ellipse cx="70" cy="110" rx="44" ry="54"
           transform="rotate(-16 70 110)" fill="url(#body)"
           stroke="#1d6493" stroke-width="4"/>
  <ellipse cx="186" cy="110" rx="44" ry="54"
           transform="rotate(16 186 110)" fill="url(#body)"
           stroke="#1d6493" stroke-width="4"/>
  <ellipse cx="74" cy="114" rx="25" ry="33"
           transform="rotate(-16 74 114)" fill="#bcd8ef"/>
  <ellipse cx="182" cy="114" rx="25" ry="33"
           transform="rotate(16 182 114)" fill="#bcd8ef"/>

  <!-- cabeça -->
  <path d="M70 104 C70 62 186 62 186 104
           C186 150 166 172 128 172
           C90 172 70 150 70 104 Z"
        fill="url(#body)" stroke="#1d6493" stroke-width="4"/>

  <!-- presas -->
  <path d="M112 166 C109 181 105 190 97 197" fill="none"
        stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
  <path d="M144 166 C147 181 151 190 159 197" fill="none"
        stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- tromba = curva de Nyquist (espiral de impedância) -->
  <path d="M128 150 C128 180 118 198 130 216
           C140 232 164 230 170 210
           C176 192 159 182 149 193
           C142 201 150 210 159 206"
        fill="none" stroke="url(#body)" stroke-width="18"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M128 150 C128 180 118 198 130 216
           C140 232 164 230 170 210
           C176 192 159 182 149 193
           C142 201 150 210 159 206"
        fill="none" stroke="#1d6493" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- olhos -->
  <circle cx="104" cy="114" r="9" fill="#123247"/>
  <circle cx="152" cy="114" r="9" fill="#123247"/>
  <circle cx="107" cy="111" r="3" fill="#ffffff"/>
  <circle cx="155" cy="111" r="3" fill="#ffffff"/>
</svg>
